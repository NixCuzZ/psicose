<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aviso do Sistema</title>
<style>
body {
    margin: 0;
    padding: 0;
    background-color: #000;
    color: #0f0;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    user-select: none;
    cursor: none;
    touch-action: none;
}
#content {
    text-align: center;
    width: 100%;
    padding: 20px;
    box-sizing: border-box;
    z-index: 10;
    font-weight: bold;
}
.shake {
    animation: shake 0.05s infinite;
}
.glitch {
    animation: glitch 0.05s infinite;
    color: #f00;
    text-shadow: 4px 0 #0f0, -4px 0 #00f;
    font-size: 8vw;
}
.flash {
    animation: flash 0.1s infinite;
}
@keyframes shake {
    0% { transform: translate(5px, 3px) rotate(0deg); }
    10% { transform: translate(-3px, -5px) rotate(-2deg); }
    20% { transform: translate(-7px, 0px) rotate(2deg); }
    30% { transform: translate(0px, 5px) rotate(0deg); }
    40% { transform: translate(3px, -3px) rotate(2deg); }
    50% { transform: translate(-3px, 5px) rotate(-2deg); }
    60% { transform: translate(-7px, 3px) rotate(0deg); }
    70% { transform: translate(5px, 3px) rotate(-2deg); }
    80% { transform: translate(-3px, -3px) rotate(2deg); }
    90% { transform: translate(5px, 5px) rotate(0deg); }
    100% { transform: translate(3px, -5px) rotate(-2deg); }
}
@keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-5px, 5px); }
    40% { transform: translate(-5px, -5px); }
    60% { transform: translate(5px, 5px); }
    80% { transform: translate(5px, -5px); }
    100% { transform: translate(0); }
}
@keyframes flash {
    0% { background-color: #f00; }
    50% { background-color: #fff; }
    100% { background-color: #000; }
}
.fake-popup {
    position: absolute;
    width: 90%;
    max-width: 320px;
    background: #ececec;
    border: 3px solid #fff;
    border-right-color: #888;
    border-bottom-color: #888;
    z-index: 1000;
    box-shadow: 5px 5px 0px rgba(0,0,0,0.8);
    transform: translate(-50%, -50%);
}
.fake-popup-header {
    background: #000080;
    color: #fff;
    padding: 5px 10px;
    font-size: 14px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    user-select: none;
}
.fake-popup-close {
    background: #ececec;
    color: #000;
    border: 2px solid #fff;
    border-right-color: #888;
    border-bottom-color: #888;
    width: 20px;
    height: 20px;
    line-height: 16px;
    text-align: center;
    cursor: crosshair;
    font-weight: bold;
}
.fake-popup-body {
    padding: 15px;
    font-size: 16px;
    color: #000;
    text-align: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-weight: bold;
    background: #ececec;
    display: flex;
    align-items: center;
    gap: 10px;
}
.icon-error {
    background: #f00;
    color: #fff;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    flex-shrink: 0;
}
.final-screen {
    background-color: #0000aa;
    color: #fff;
    font-family: 'Courier New', Courier, monospace;
    font-size: 16px;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
    height: 100vh;
    width: 100vw;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 9999;
    box-sizing: border-box;
}
@media (min-width: 600px) {
    .glitch { font-size: 60px; }
    .fake-popup { max-width: 400px; }
    .fake-popup-body { font-size: 18px; padding: 25px; gap: 15px; }
    .icon-error { width: 40px; height: 40px; font-size: 24px; }
    .final-screen { font-size: 20px; padding: 50px; }
}
</style>
</head>
<body>

<div id="content"></div>

<div id="final" class="final-screen">
    <p>ERRO FATAL NO SISTEMA.</p>
    <p>O DISPOSITIVO FOI COMPROMETIDO.</p>
    <p>A TRANSFERIR DADOS PARA SERVIDOR REMOTO...</p>
    <p>NÃO DESLIGUE O DISPOSITIVO.</p>
    <p>Progresso: <span id="progress">0</span>%</p>
</div>

<script>
const content = document.getElementById('content');
const finalScreen = document.getElementById('final');
const progressEl = document.getElementById('progress');
const body = document.body;

const msgs = [
    "TROJAN DETETADO",
    "A TRANSFERIR DADOS...",
    "ACESSO CONCEDIDO",
    "FIREWALL DESATIVADA",
    "A ENCRIPTAR DISCO...",
    "ERRO IRREVERSÍVEL",
    "CÂMARA ATIVADA",
    "FICHEIROS BLOQUEADOS",
    "SENHAS EXTRAÍDAS",
    "CONTATOS COPIADOS"
];

let audioCtx = null;
let popupCount = 0;
let isBsod = false;
let interactionRegistered = false;
const maxPopups = 80;

function initInteractions() {
    if (interactionRegistered) return;
    interactionRegistered = true;
    
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
    
    try {
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(() => {});
        }
    } catch(e) {}
}

function playBeep() {
    if (!audioCtx || audioCtx.state !== 'running') return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = Math.random() > 0.5 ? 'sawtooth' : 'square';
    osc.frequency.setValueAtTime(100 + Math.random() * 2000, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
}

function spawnPopup() {
    if (popupCount >= maxPopups || isBsod) return;
    
    const p = document.createElement('div');
    p.className = 'fake-popup';
    
    const leftPos = 10 + Math.random() * 80;
    const topPos = 10 + Math.random() * 80;
    
    p.style.left = leftPos + '%';
    p.style.top = topPos + '%';
    
    const h = document.createElement('div');
    h.className = 'fake-popup-header';
    h.innerHTML = '<span>ERRO FATAL</span><span class="fake-popup-close">X</span>';
    
    const b = document.createElement('div');
    b.className = 'fake-popup-body';
    b.innerHTML = `<div class="icon-error">X</div><span>${msgs[Math.floor(Math.random() * msgs.length)]}</span>`;
    
    p.appendChild(h);
    p.appendChild(b);
    document.body.appendChild(p);
    
    playBeep();
    popupCount++;
    
    p.querySelector('.fake-popup-close').addEventListener('click', (e) => {
        e.stopPropagation();
        initInteractions();
        p.remove();
        popupCount--;
        spawnPopup();
        spawnPopup();
        spawnPopup();
    });
}

function bsod() {
    isBsod = true;
    body.className = '';
    document.querySelectorAll('.fake-popup').forEach(p => p.remove());
    content.style.display = 'none';
    finalScreen.style.display = 'flex';
    
    let p = 0;
    const int = setInterval(() => {
        p += Math.floor(Math.random() * 8);
        if (p >= 100) {
            p = 100;
            clearInterval(int);
            setTimeout(() => {
                finalScreen.innerHTML = '<p style="text-align:center; width:100%; color:red; font-size:8vw; margin-top:20vh; font-weight:bold;">FIM DA SIMULAÇÃO</p>';
                finalScreen.style.backgroundColor = '#000';
            }, 2000);
        }
        progressEl.innerText = p;
    }, 100);
}

function triggerChaos() {
    body.classList.add('shake', 'flash');
    content.innerHTML = '<div class="glitch">SISTEMA COMPROMETIDO</div>';
    
    let spawnInt = setInterval(() => {
        spawnPopup();
        spawnPopup();
        if (popupCount >= maxPopups) {
            clearInterval(spawnInt);
        }
    }, 80);

    setTimeout(() => {
        clearInterval(spawnInt);
        bsod();
    }, 10000);
}

window.addEventListener('click', initInteractions);
window.addEventListener('touchstart', initInteractions);
window.addEventListener('keydown', (e) => {
    initInteractions();
    e.preventDefault();
    spawnPopup();
    spawnPopup();
});

window.onload = () => {
    triggerChaos();
};
</script>
</body>
</html>
