<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviso do Sistema</title>
<style>
body {
    margin: 0;
    padding: 0;
    background-color: #000;
    color: #0f0;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    user-select: none;
    cursor: none;
    transition: background-color 0.1s;
}
#content {
    text-align: center;
    font-size: 24px;
    width: 100%;
    padding: 20px;
    box-sizing: border-box;
}
.shake {
    animation: shake 0.1s infinite;
}
.glitch {
    animation: glitch 0.05s infinite;
    color: #f00;
    font-weight: bold;
    text-shadow: 2px 0 #0f0, -2px 0 #00f;
}
.flash {
    animation: flash 0.1s;
}
@keyframes shake {
    0% { transform: translate(2px, 1px) rotate(0deg); }
    10% { transform: translate(-1px, -2px) rotate(-1deg); }
    20% { transform: translate(-3px, 0px) rotate(1deg); }
    30% { transform: translate(0px, 2px) rotate(0deg); }
    40% { transform: translate(1px, -1px) rotate(1deg); }
    50% { transform: translate(-1px, 2px) rotate(-1deg); }
    60% { transform: translate(-3px, 1px) rotate(0deg); }
    70% { transform: translate(2px, 1px) rotate(-1deg); }
    80% { transform: translate(-1px, -1px) rotate(1deg); }
    90% { transform: translate(2px, 2px) rotate(0deg); }
    100% { transform: translate(1px, -2px) rotate(-1deg); }
}
@keyframes glitch {
    0% { transform: translate(0) }
    20% { transform: translate(-2px, 2px) }
    40% { transform: translate(-2px, -2px) }
    60% { transform: translate(2px, 2px) }
    80% { transform: translate(2px, -2px) }
    100% { transform: translate(0) }
}
@keyframes flash {
    0% { background-color: #f00; }
    50% { background-color: #0f0; }
    100% { background-color: #000; }
}
.large-text {
    font-size: 48px;
}
.small-text {
    font-size: 14px;
}
.fake-popup {
    position: absolute;
    width: 85%;
    max-width: 320px;
    background: #ccc;
    border: 2px solid #fff;
    border-right-color: #555;
    border-bottom-color: #555;
    z-index: 1000;
    box-shadow: 4px 4px 10px rgba(0,0,0,0.5);
}
.fake-popup-header {
    background: #0000aa;
    color: #fff;
    padding: 5px;
    font-size: 14px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    font-family: sans-serif;
}
.fake-popup-close {
    background: #ccc;
    color: #000;
    border: 1px solid #fff;
    border-right-color: #555;
    border-bottom-color: #555;
    width: 18px;
    height: 18px;
    line-height: 16px;
    text-align: center;
    cursor: none;
}
.fake-popup-body {
    padding: 20px;
    font-size: 16px;
    color: #000;
    text-align: center;
    font-family: sans-serif;
    font-weight: bold;
}
.final-screen {
    background-color: #000;
    color: #fff;
    font-family: sans-serif;
    font-size: 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 9999;
    opacity: 0;
    transition: opacity 2s;
}
.final-screen.visible {
    opacity: 1;
    cursor: default;
}
.final-screen p {
    margin: 10px 0;
    opacity: 0;
    animation: fadeIn 2s forwards;
    text-align: center;
    padding: 0 20px;
}
.final-screen p:nth-child(2) {
    animation-delay: 3s;
}
@keyframes fadeIn {
    to { opacity: 1; }
}
</style>
</head>
<body>
<div id="content"></div>
<div id="final" class="final-screen" style="display:none;">
    <p>Isso foi uma simulação.</p>
    <p>Agora imagine não conseguir distinguir isso da realidade.</p>
</div>

<script>
const content = document.getElementById('content');
const finalScreen = document.getElementById('final');
const body = document.body;

const seqInit = ["Inicializando sistema...", "Verificando dispositivo...", "Acesso detectado"];
const seqMain = ["Coletando dados...", "Acessando câmera...", "Localização identificada", "Dispositivo comprometido", "Você não deveria estar aqui", "Permissão concedida", "Acesso remoto ativo", "Sincronizando dados"];
const seqErr = ["Erro crítico", "Sistema corrompido", "Encerrando sessão"];

let audioCtx = null;
let isFinished = false;
let interactionTimeout = null;
let phase = 0;
let popupCount = 0;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function beep(freq, type, vol, dur) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
}

function runSequence(arr, interval, callback) {
    let i = 0;
    const intId = setInterval(() => {
        if (isFinished) {
            clearInterval(intId);
            return;
        }
        if (i < arr.length) {
            content.innerText = arr[i];
            beep(800 + Math.random() * 400, 'square', 0.1, 0.1);
            
            const rand = Math.random();
            if (rand > 0.8) {
                content.className = 'large-text';
            } else if (rand > 0.6) {
                content.className = 'small-text';
            } else {
                content.className = '';
            }

            if (Math.random() > 0.85) {
                body.classList.add('flash');
                setTimeout(() => body.classList.remove('flash'), 100);
            }

            i++;
        } else {
            clearInterval(intId);
            if (callback) callback();
        }
    }, interval);
}

function startSimulation() {
    try {
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(() => {});
        }
    } catch(e) {}
    
    runSequence(seqInit, 1500, () => {
        phase = 1;
        let mainCount = 0;
        const mainInt = setInterval(() => {
            if (isFinished) {
                clearInterval(mainInt);
                return;
            }
            content.innerText = seqMain[Math.floor(Math.random() * seqMain.length)];
            content.className = Math.random() > 0.6 ? 'glitch' : '';
            beep(150 + Math.random() * 100, 'sawtooth', 0.2, 0.2);
            mainCount++;
            
            if (mainCount > 3 && popupCount < 5 && Math.random() > 0.5) {
                spawnPopup();
            }
            
            if (mainCount > 12) {
                clearInterval(mainInt);
                phase = 2;
                body.classList.add('shake');
                content.className = 'glitch large-text';
                runSequence(seqErr, 800, () => {
                    endSimulation();
                });
            }
        }, 1200);
    });
}

function spawnPopup() {
    if (popupCount >= 5) return;
    const msgs = ["ERRO 0x00000000", "TRANSFERINDO DADOS...", "CÂMERA ATIVA", "ACESSO ROOT GARANTIDO", "SISTEMA CORROMPIDO"];
    
    const p = document.createElement('div');
    p.className = 'fake-popup';
    p.style.top = Math.floor(Math.random() * 50 + 10) + '%';
    p.style.left = Math.floor(Math.random() * 10 + 2) + '%';
    
    const h = document.createElement('div');
    h.className = 'fake-popup-header';
    h.innerHTML = '<span>Alerta de Sistema</span><span class="fake-popup-close">X</span>';
    
    const b = document.createElement('div');
    b.className = 'fake-popup-body';
    b.innerText = msgs[popupCount];
    
    p.appendChild(h);
    p.appendChild(b);
    document.body.appendChild(p);
    
    p.querySelector('.fake-popup-close').addEventListener('click', (e) => {
        e.stopPropagation();
        beep(2000, 'square', 0.1, 0.1);
        p.style.left = Math.floor(Math.random() * 10 + 2) + '%';
        p.style.top = Math.floor(Math.random() * 50 + 10) + '%';
        p.className = 'fake-popup glitch';
        setTimeout(() => p.classList.remove('glitch'), 200);
    });
    
    popupCount++;
    beep(600, 'sawtooth', 0.3, 0.3);
}

function endSimulation() {
    isFinished = true;
    body.classList.remove('shake');
    body.style.backgroundColor = '#000';
    content.style.display = 'none';
    
    document.querySelectorAll('.fake-popup').forEach(p => p.style.display = 'none');
    
    setTimeout(() => {
        try {
            window.close();
        } catch(e) {}
        
        finalScreen.style.display = 'flex';
        setTimeout(() => {
            finalScreen.classList.add('visible');
        }, 50);
    }, 500);
}

function handleInteraction() {
    if (isFinished) return;
    initAudio();
    
    if (phase === 0) {
        startSimulation();
        phase = 0.5;
    } else if (phase === 1) {
        clearTimeout(interactionTimeout);
        const oldText = content.innerText;
        const oldClass = content.className;
        
        content.innerText = Math.random() > 0.5 ? "Movimento detectado" : "Não tente sair";
        content.className = 'glitch large-text';
        body.style.backgroundColor = '#200';
        beep(1200, 'square', 0.3, 0.3);
        
        interactionTimeout = setTimeout(() => {
            if(isFinished) return;
            content.innerText = oldText;
            content.className = oldClass;
            body.style.backgroundColor = '#000';
        }, 600);
    }
}

window.addEventListener('mousemove', handleInteraction);
window.addEventListener('touchstart', handleInteraction);
window.addEventListener('click', handleInteraction);
window.addEventListener('keydown', handleInteraction);

setTimeout(() => {
    if (phase === 0) {
        initAudio();
        startSimulation();
        phase = 0.5;
    }
}, 3000);

</script>
</body>
</html>
